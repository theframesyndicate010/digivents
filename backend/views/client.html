<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin HTML Clients</title>
	<style>
		body{margin:0;font-family:Arial,sans-serif;background:#f6f7fb;color:#1f2937}.wrap{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
		.s{background:#111827;color:#fff;padding:16px}.s a{display:block;color:#d1d5db;padding:8px;text-decoration:none;border-radius:8px;margin-bottom:6px}.s a.active,.s a:hover{background:#1f2937;color:#fff}
		.m{padding:18px}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}
		@media(max-width:900px){.wrap{grid-template-columns:1fr}}
	</style>
</head>
<body><div class="wrap"><aside class="s"><h2>Admin HTML</h2><a href="/admin/html/dashboard">Dashboard</a><a class="active" href="/admin/html/client">Clients</a><a href="/admin/html/project">Projects</a><a href="/admin/html/creator">Creators</a><a href="/admin/html/graphics">Graphics</a><a href="/admin/html/message">Messages</a></aside><main class="m"><h1>Clients</h1><p id="error" style="color:#b91c1c"></p><table><thead><tr><th>Name</th><th>Website</th><th>Instagram</th></tr></thead><tbody id="rows"><tr><td colspan="3">Loading...</td></tr></tbody></table></main></div>
<script>
function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
(async function(){
	try{
		const r=await fetch('/api/clients',{credentials:'include'});const j=await r.json();
		if(!r.ok||j.success===false) throw new Error(j.message||'Failed');
		const items=Array.isArray(j.data)?j.data:[];
		document.getElementById('rows').innerHTML=items.length?items.map(function(x){
			return '<tr><td>'+esc(x.name)+'</td><td>'+(x.website?'<a href="'+esc(x.website)+'" target="_blank">'+esc(x.website)+'</a>':'-')+'</td><td>'+(x.instagram_link?'<a href="'+esc(x.instagram_link)+'" target="_blank">Instagram</a>':'-')+'</td></tr>';
		}).join(''):'<tr><td colspan="3">No clients</td></tr>';
	}catch(e){document.getElementById('error').textContent=e.message;document.getElementById('rows').innerHTML='<tr><td colspan="3">Failed to load</td></tr>';}
})();
</script></body></html>
