<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin HTML Graphics</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }
    .s {
      background: #111827;
      color: #fff;
      padding: 16px;
      height: 100vh;
      overflow-y: auto;
    }
    .s h2 {
      margin-top: 0;
    }
    .s a {
      display: block;
      color: #d1d5db;
      padding: 8px;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .s a.active,
    .s a:hover {
      background: #1f2937;
      color: #fff;
    }
    .m {
      padding: 24px;
      overflow-y: auto;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 24px;
    }
    .error {
      color: #b91c1c;
      background: #fee;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .success {
      color: #166534;
      background: #dcfce7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .form-section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }
    .file-input-label {
      display: block;
      padding: 12px;
      background: #f3f4f6;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.3s;
    }
    .file-input-label:hover {
      background: #e5e7eb;
    }
    .file-input-label.dragover {
      background: #dbeafe;
      border-color: #3b82f6;
    }
    #photoInput {
      display: none;
    }
    .file-name {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }
    .form-buttons {
      display: flex;
      gap: 8px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #1f2937;
    }
    .btn-secondary:hover {
      background: #d1d5db;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .thumb {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      background: #e5e7eb;
    }
    .card h3 {
      margin: 12px 0 6px 0;
      font-size: 16px;
    }
    .card p {
      margin: 0;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
    }
    .card-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      flex: 1;
      text-align: center;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .loading {
      text-align: center;
      color: #6b7280;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top: 2px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="s">
      <h2>Admin HTML</h2>
      <a href="/admin/html/dashboard">Dashboard</a>
      <a href="/admin/html/client">Clients</a>
      <a href="/admin/html/project">Projects</a>
      <a href="/admin/html/creator">Creators</a>
      <a class="active" href="/admin/html/graphics">Graphics</a>
      <a href="/admin/html/message">Messages</a>
    </aside>
    <main class="m">
      <h1>Graphics Management</h1>
      
      <div id="errorMsg" class="error"></div>
      <div id="successMsg" class="success"></div>

      <!-- Upload Form Section -->
      <div class="form-section">
        <h2>Upload New Graphic</h2>
        <form id="uploadForm">
          <div class="form-group">
            <label for="nameInput">Name *</label>
            <input type="text" id="nameInput" name="name" required placeholder="e.g., Social Media Banner">
          </div>

          <div class="form-group">
            <label for="titleInput">Title</label>
            <input type="text" id="titleInput" name="title" placeholder="Display title (optional)">
          </div>

          <div class="form-group">
            <label for="descriptionInput">Description</label>
            <textarea id="descriptionInput" name="description" placeholder="Describe this graphic..."></textarea>
          </div>

          <div class="form-group">
            <label>Photo *</label>
            <div class="file-input-wrapper">
              <label for="photoInput" class="file-input-label" id="photoLabel">
                Click to select or drag & drop a photo
              </label>
              <input type="file" id="photoInput" accept="image/*" required>
              <div class="file-name" id="fileName"></div>
            </div>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn-primary" id="submitBtn">Upload Graphic</button>
            <button type="reset" class="btn-secondary">Clear</button>
          </div>
        </form>
      </div>

      <!-- Graphics List Section -->
      <h2>Existing Graphics</h2>
      <section id="list" class="grid">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </section>
    </main>
  </div>

  <script>
    function esc(v) {
      return String(v || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // Drag & drop handlers
    const photoLabel = document.getElementById('photoLabel');
    const photoInput = document.getElementById('photoInput');

    photoLabel.addEventListener('dragover', (e) => {
      e.preventDefault();
      photoLabel.classList.add('dragover');
    });

    photoLabel.addEventListener('dragleave', () => {
      photoLabel.classList.remove('dragover');
    });

    photoLabel.addEventListener('drop', (e) => {
      e.preventDefault();
      photoLabel.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length) {
        photoInput.files = files;
        updateFileName();
      }
    });

    photoInput.addEventListener('change', updateFileName);

    function updateFileName() {
      const fileName = photoInput.files[0]?.name || '';
      document.getElementById('fileName').textContent = fileName ? 'Selected: ' + fileName : '';
    }

    // Form submission
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      formData.append('name', document.getElementById('nameInput').value);
      formData.append('title', document.getElementById('titleInput').value);
      formData.append('description', document.getElementById('descriptionInput').value);
      formData.append('photo', photoInput.files[0]);

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading...';

      try {
        const r = await fetch('/api/graphics', {
          method: 'POST',
          body: formData,
          credentials: 'include'
        });
        const j = await r.json();

        if (!r.ok || j.success === false) {
          throw new Error(j.message || 'Upload failed');
        }

        showSuccess('Graphic uploaded successfully!');
        document.getElementById('uploadForm').reset();
        updateFileName();
        loadGraphics(); // Reload the list
      } catch (e) {
        showError('Error: ' + e.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload Graphic';
      }
    });

    // Load graphics with delete functionality
    async function loadGraphics() {
      try {
        const r = await fetch('/api/graphics', { credentials: 'include' });
        const j = await r.json();

        if (!r.ok || j.success === false) throw new Error(j.message || 'Failed to load');

        const items = Array.isArray(j.data) ? j.data : [];
        const listEl = document.getElementById('list');

        if (!items.length) {
          listEl.innerHTML = '<p>No graphics yet. Upload one to get started!</p>';
          return;
        }

        listEl.innerHTML = items.map(function(x) {
          const p = x.photo || x.image_path || '';
          const id = x.id || '';
          const name = esc(x.name || x.title || 'Untitled');
          const desc = esc(x.description || '');

          return `<article class="card">
            <img class="thumb" src="${esc(p)}" alt="graphic">
            <h3>${name}</h3>
            <p>${desc}</p>
            <div class="card-actions">
              <button class="btn-small btn-danger" onclick="deleteGraphic('${esc(id)}')">Delete</button>
            </div>
          </article>`;
        }).join('');
      } catch (e) {
        document.getElementById('list').innerHTML = '<p style="color: #b91c1c;">Failed to load graphics: ' + esc(e.message) + '</p>';
      }
    }

    // Delete graphic function
    window.deleteGraphic = async function(id) {
      if (!confirm('Are you sure you want to delete this graphic?')) return;

      try {
        const r = await fetch(`/api/graphics/${id}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        const j = await r.json();

        if (!r.ok || j.success === false) {
          throw new Error(j.message || 'Delete failed');
        }

        showSuccess('Graphic deleted successfully!');
        loadGraphics();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    };

    // Load on page load
    loadGraphics();
  </script>
</body>
</html>
