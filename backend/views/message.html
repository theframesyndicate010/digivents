<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin HTML Messages</title><style>body{margin:0;font-family:Arial,sans-serif;background:#f6f7fb;color:#1f2937}.wrap{display:grid;grid-template-columns:220px 1fr;min-height:100vh}.s{background:#111827;color:#fff;padding:16px}.s a{display:block;color:#d1d5db;padding:8px;text-decoration:none;border-radius:8px;margin-bottom:6px}.s a.active,.s a:hover{background:#1f2937;color:#fff}.m{padding:18px}table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb}th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}</style></head>
<body><div class="wrap"><aside class="s"><h2>Admin HTML</h2><a href="/admin/html/dashboard">Dashboard</a><a href="/admin/html/client">Clients</a><a href="/admin/html/project">Projects</a><a href="/admin/html/creator">Creators</a><a href="/admin/html/graphics">Graphics</a><a class="active" href="/admin/html/message">Messages</a></aside><main class="m"><h1>Messages</h1><p id="error" style="color:#b91c1c"></p><table><thead><tr><th>Name</th><th>Email</th><th>Message</th></tr></thead><tbody id="rows"><tr><td colspan="3">Loading...</td></tr></tbody></table></main></div>
<script>
function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
(async function(){
 try{const r=await fetch('/api/messages?perPage=100',{credentials:'include'});const j=await r.json();if(!r.ok||j.success===false)throw new Error(j.message||'Failed');
 const items=j.data&&Array.isArray(j.data.messages)?j.data.messages:[];
 document.getElementById('rows').innerHTML=items.length?items.map(function(x){return '<tr><td>'+esc(x.name)+'</td><td>'+esc(x.email)+'</td><td>'+esc(x.message)+'</td></tr>';}).join(''):'<tr><td colspan="3">No messages</td></tr>';
 }catch(e){document.getElementById('error').textContent=e.message;document.getElementById('rows').innerHTML='<tr><td colspan="3">Failed to load</td></tr>';}
})();
</script></body></html>
