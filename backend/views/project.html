<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin HTML Projects</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }
    .wrap {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }
    .s {
      background: #111827;
      color: #fff;
      padding: 16px;
      height: 100vh;
      overflow-y: auto;
    }
    .s h2 {
      margin-top: 0;
    }
    .s a {
      display: block;
      color: #d1d5db;
      padding: 8px;
      text-decoration: none;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .s a.active,
    .s a:hover {
      background: #1f2937;
      color: #fff;
    }
    .m {
      padding: 24px;
      overflow-y: auto;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 24px;
    }
    h2 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-size: 18px;
    }
    .error {
      color: #b91c1c;
      background: #fee;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .success {
      color: #166534;
      background: #dcfce7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
    }
    .form-section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .file-input-wrapper {
      position: relative;
      display: inline-block;
      width: 100%;
    }
    .file-input-label {
      display: block;
      padding: 12px;
      background: #f3f4f6;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: background 0.3s;
    }
    .file-input-label:hover {
      background: #e5e7eb;
    }
    .file-input-label.dragover {
      background: #dbeafe;
      border-color: #3b82f6;
    }
    .file-input-label.multi {
      font-size: 13px;
      color: #6b7280;
    }
    input[type="file"] {
      display: none;
    }
    .file-names {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }
    .file-names .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      padding: 4px 8px;
      border-radius: 4px;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .form-buttons {
      display: flex;
      gap: 8px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-primary:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #e5e7eb;
      color: #1f2937;
    }
    .btn-secondary:hover {
      background: #d1d5db;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .card-header {
      position: relative;
      height: 160px;
      background: #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .card-header img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card h3 {
      margin: 8px 0 4px 0;
      font-size: 16px;
    }
    .tag-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .card p {
      margin: 4px 0;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .media-preview {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e5e7eb;
    }
    .media-preview p {
      margin: 0 0 4px 0;
      font-size: 11px;
      color: #9ca3af;
    }
    .media-thumbs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }
    .media-thumb {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .card-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      flex: 1;
      text-align: center;
    }
    .btn-danger {
      background: #ef4444;
      color: #fff;
    }
    .btn-danger:hover {
      background: #dc2626;
    }
    .loading {
      text-align: center;
      color: #6b7280;
    }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top: 2px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .two-cols {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="s">
      <h2>Admin HTML</h2>
      <a href="/admin/html/dashboard">Dashboard</a>
      <a href="/admin/html/client">Clients</a>
      <a class="active" href="/admin/html/project">Projects</a>
      <a href="/admin/html/creator">Creators</a>
      <a href="/admin/html/graphics">Graphics</a>
      <a href="/admin/html/message">Messages</a>
    </aside>
    <main class="m">
      <h1>Projects Management</h1>
      
      <div id="errorMsg" class="error"></div>
      <div id="successMsg" class="success"></div>

      <!-- Upload Form Section -->
      <div class="form-section">
        <h2>Create New Project</h2>
        <form id="uploadForm">
          <div class="form-group">
            <label for="nameInput">Project Name *</label>
            <input type="text" id="nameInput" name="name" required placeholder="e.g., Website Redesign">
          </div>

          <div class="form-group">
            <label for="descriptionInput">Description</label>
            <textarea id="descriptionInput" name="description" placeholder="Describe this project..."></textarea>
          </div>

          <div class="two-cols">
            <div class="form-group">
              <label for="youtubeInput">YouTube Link</label>
              <input type="url" id="youtubeInput" name="youtubeLink" placeholder="https://youtube.com...">
            </div>
            <div class="form-group">
              <label for="instagramInput">Instagram Link</label>
              <input type="url" id="instagramInput" name="instagramLink" placeholder="https://instagram.com...">
            </div>
          </div>

          <div class="two-cols">
            <div class="form-group">
              <label for="tiktokInput">TikTok Link</label>
              <input type="url" id="tiktokInput" name="tiktokLink" placeholder="https://tiktok.com...">
            </div>
            <div class="form-group">
              <label for="facebookInput">Facebook Link</label>
              <input type="url" id="facebookInput" name="facebookLink" placeholder="https://facebook.com...">
            </div>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn-primary" id="submitBtn">Create Project</button>
            <button type="reset" class="btn-secondary">Clear</button>
          </div>
        </form>
      </div>

      <!-- Projects List Section -->
      <h2>Existing Projects</h2>
      <section id="list" class="grid">
        <div class="loading"><div class="spinner"></div> Loading...</div>
      </section>
    </main>
  </div>

  <script>
    function esc(v) {
      return String(v || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    // Drag & drop for cover photo
    const coverPhotoLabel = document.getElementById('coverPhotoLabel');
    const coverPhotoInput = document.getElementById('coverPhotoInput');

    coverPhotoLabel.addEventListener('dragover', (e) => {
      e.preventDefault();
      coverPhotoLabel.classList.add('dragover');
    });
    coverPhotoLabel.addEventListener('dragleave', () => {
      coverPhotoLabel.classList.remove('dragover');
    });
    coverPhotoLabel.addEventListener('drop', (e) => {
      e.preventDefault();
      coverPhotoLabel.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        coverPhotoInput.files = e.dataTransfer.files;
        updateCoverPhotoName();
      }
    });

    coverPhotoInput.addEventListener('change', updateCoverPhotoName);

    function updateCoverPhotoName() {
      const fileName = coverPhotoInput.files[0]?.name || '';
      document.getElementById('coverPhotoName').innerHTML = fileName ? 
        '<span class="badge">' + esc(fileName) + '</span>' : '';
    }

    // Drag & drop for graphics
    const graphicsLabel = document.getElementById('graphicsLabel');
    const graphicsInput = document.getElementById('graphicsInput');

    graphicsLabel.addEventListener('dragover', (e) => {
      e.preventDefault();
      graphicsLabel.classList.add('dragover');
    });
    graphicsLabel.addEventListener('dragleave', () => {
      graphicsLabel.classList.remove('dragover');
    });
    graphicsLabel.addEventListener('drop', (e) => {
      e.preventDefault();
      graphicsLabel.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        graphicsInput.files = e.dataTransfer.files;
        updateGraphicsNames();
      }
    });

    graphicsInput.addEventListener('change', updateGraphicsNames);

    function updateGraphicsNames() {
      const files = Array.from(graphicsInput.files);
      const name = files.length ? 
        files.slice(0, 3).map(f => '<span class="badge">' + esc(f.name) + '</span>').join('') +
        (files.length > 3 ? '<span class="badge">+' + (files.length - 3) + ' more</span>' : '') : '';
      document.getElementById('graphicsNames').innerHTML = name;
    }

    // Form submission
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData();
      formData.append('name', document.getElementById('nameInput').value);
      formData.append('tag', document.getElementById('tagInput').value);
      formData.append('description', document.getElementById('descriptionInput').value);
      formData.append('contact', document.getElementById('contactInput').value);
      formData.append('youtubeLink', document.getElementById('youtubeInput').value);
      formData.append('instagramLink', document.getElementById('instagramInput').value);
      formData.append('tiktokLink', document.getElementById('tiktokInput').value);
      formData.append('facebookLink', document.getElementById('facebookInput').value);

      if (coverPhotoInput.files[0]) {
        formData.append('coverPhoto', coverPhotoInput.files[0]);
      }

      Array.from(graphicsInput.files).forEach(file => {
        formData.append('graphics', file);
      });

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating...';

      try {
        const r = await fetch('/api/projects', {
          method: 'POST',
          body: formData,
          credentials: 'include'
        });
        const j = await r.json();

        if (!r.ok || j.success === false) {
          throw new Error(j.message || 'Create failed');
        }

        showSuccess('Project created successfully!');
        document.getElementById('uploadForm').reset();
        updateCoverPhotoName();
        updateGraphicsNames();
        loadProjects();
      } catch (e) {
        showError('Error: ' + e.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Project';
      }
    });

    // Load projects with delete functionality
    async function loadProjects() {
      try {
        const r = await fetch('/api/projects', { credentials: 'include' });
        const j = await r.json();

        if (!r.ok || j.success === false) throw new Error(j.message || 'Failed to load');

        const items = Array.isArray(j.data) ? j.data : [];
        const listEl = document.getElementById('list');

        if (!items.length) {
          listEl.innerHTML = '<p>No projects yet. Create one to get started!</p>';
          return;
        }

        listEl.innerHTML = items.map(function(x) {
          const id = x.id || '';
          const name = esc(x.name || 'Untitled');
          const tag = esc(x.tag || '');
          const desc = esc(x.description || '');
          const cover = x.cover_photo || x.coverPhoto || '';
          const media = Array.isArray(x.media) ? x.media : (x.media ? JSON.parse(x.media) : []);

          let html = '<article class="card"><div class="card-header">';
          if (cover) {
            html += '<img src="' + esc(cover) + '" alt="project">';
          } else {
            html += '<div style="display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; background: #e5e7eb;">No cover</div>';
          }
          html += '</div>';
          html += '<h3>' + name + '</h3>';
          if (tag) html += '<span class="tag-badge">' + tag + '</span>';
          html += '<p>' + desc + '</p>';
          
          if (media.length > 0) {
            html += '<div class="media-preview"><p>Gallery (' + media.length + ' images)</p><div class="media-thumbs">';
            media.slice(0, 5).forEach(m => {
              html += '<img class="media-thumb" src="' + esc(m) + '" alt="gallery" title="' + esc(m) + '">';
            });
            html += '</div></div>';
          }
          
          html += '<div class="card-actions"><button class="btn-small btn-danger" onclick="deleteProject(\'' + esc(id) + '\')">Delete</button></div></article>';
          
          return html;
        }).join('');
      } catch (e) {
        document.getElementById('list').innerHTML = '<p style="color: #b91c1c;">Failed to load projects: ' + esc(e.message) + '</p>';
      }
    }

    // Delete project function
    window.deleteProject = async function(id) {
      if (!confirm('Are you sure you want to delete this project?')) return;

      try {
        const r = await fetch(`/api/projects/${id}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        const j = await r.json();

        if (!r.ok || j.success === false) {
          throw new Error(j.message || 'Delete failed');
        }

        showSuccess('Project deleted successfully!');
        loadProjects();
      } catch (e) {
        showError('Error: ' + e.message);
      }
    };

    // Load on page load
    loadProjects();
  </script>
</body>
</html>
