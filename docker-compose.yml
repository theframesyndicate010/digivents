version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: digivents_db
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - digivents_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Strapi Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digivents_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Server
      HOST: 0.0.0.0
      PORT: 1337
      
      # Database
      DATABASE_CLIENT: ${DATABASE_CLIENT:-postgres}
      DATABASE_HOST: postgres
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-postgres}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      
      # Secrets
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      
      # Supabase
      SUPABASE_API_URL: ${SUPABASE_API_URL}
      SUPABASE_API_KEY: ${SUPABASE_API_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET}
      SUPABASE_DIRECTORY: ${SUPABASE_DIRECTORY}
      
      # ImageKit
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
      
      # Client URL
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "1337:1337"
    volumes:
      - ./backend/public:/app/backend/public
    networks:
      - digivents_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  digivents_network:
    driver: bridge
