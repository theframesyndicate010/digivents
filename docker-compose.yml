services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: digivents_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DATABASE_NAME:-digivents}
      MYSQL_USER: ${DATABASE_USERNAME:-digivents_user}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-digivents_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/migrations/mysql:/docker-entrypoint-initdb.d
    networks:
      - digivents_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # Backend - Node.js/Express API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digivents_backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost}

      DATABASE_CLIENT: ${DATABASE_CLIENT:-mysql}
      DATABASE_HOST: ${DATABASE_HOST:-mysql}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_NAME: ${DATABASE_NAME:-digivents}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-digivents_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-digivents_password}

      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://163.47.151.246:3000,http://digivents.com.np,https://digivents.com.np}

      RATE_LIMIT_LOGIN_MAX: ${RATE_LIMIT_LOGIN_MAX:-5}
      RATE_LIMIT_LOGIN_WINDOW: ${RATE_LIMIT_LOGIN_WINDOW:-900000}

      UPLOAD_DIR: ${UPLOAD_DIR:-./public/uploads}

    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/public/uploads
    networks:
      - digivents_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  digivents_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local